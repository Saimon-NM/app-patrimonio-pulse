name: CI

on:
  # PRs cuyo destino es `main` (p. ej. merge de dev → main).
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Evita avisos de deprecación: las Actions oficiales pasan a ejecutarse con Node 24 en el runner.
# No tiene relación con la pantalla blanca en el navegador (eso suele ser 404 de assets o HTML equivocado).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build

