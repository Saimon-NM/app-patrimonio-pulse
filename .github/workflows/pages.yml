name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Ver comentario en ci.yml: runtime de Actions (Node 24), no afecta a tu app en producción.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Solo `main`: push a main o "Run workflow" eligiendo la rama `main`.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run

      - name: Build
        env:
          # Project pages: `https://<user>.github.io/<repo>/` → base `/<repo>/`.
          # Repo usuario `*.github.io`: el sitio suele estar en la raíz del dominio → base `/`.
          # Opcional: variable de repo `VITE_BASE_URL` para forzar el valor.
          VITE_BASE_URL: ${{ vars.VITE_BASE_URL || (endsWith(github.event.repository.name, '.github.io') && '/' || format('/{0}/', github.event.repository.name)) }}
        run: npm run build

      - name: Verify production bundle (not dev index.html)
        run: |
          test -f dist/index.html
          if grep -E 'src/main\.tsx|/src/main\.tsx|\./src/main\.tsx' dist/index.html; then
            echo "::error::dist/index.html todavia referencia main.tsx (entrada de desarrollo). Esta subiendo la raiz del repo en lugar de la carpeta dist o el build fallo."
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

